services:
  - type: web
    name: truematch-m-agent-demo
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m gunicorn --workers 1 --bind 0.0.0.0:$PORT app.main:app
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHONUNBUFFERED
        value: "true"
